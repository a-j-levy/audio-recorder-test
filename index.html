<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timer & Recorder</title>
  <style>
    body { font-family: monospace; padding: 40px; }
    #timer { font-size: 48px; margin-bottom: 20px; }
    button { font-size: 18px; padding: 10px 20px; margin: 5px; cursor: pointer; }
    #status { margin-top: 10px; color: #555; }
    #recordings { margin-top: 20px; }
    .recording-entry { margin: 8px 0; }
  </style>
</head>
<body>
  <div id="timer">00:30</div>
  <button id="recordBtn" onclick="toggleRecording()">Start Recording</button>
  <div id="status"></div>
  <div id="recordings"><strong>Saved Recordings:</strong></div>

  <script>
    let mediaRecorder = null;
    let chunks = [];
    let recordingCount = 0;
    let timerInterval = null;
    let timeLeft = 30;

    function updateDisplay() {
      const s = String(timeLeft).padStart(2, '0');
      document.getElementById('timer').textContent = `00:${s}`;
    }

    async function toggleRecording() {
      const btn = document.getElementById('recordBtn');
      const status = document.getElementById('status');

      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      } else {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          chunks = [];

          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            recordingCount++;
            const timestamp = new Date().toLocaleTimeString();

            const div = document.createElement('div');
            div.className = 'recording-entry';
            div.innerHTML = `Recording ${recordingCount} (${timestamp}): 
              <audio controls src="${url}"></audio> 
              <a href="${url}" download="recording_${recordingCount}.webm">Save</a>`;
            document.getElementById('recordings').appendChild(div);

            status.textContent = `Recording ${recordingCount} saved.`;
            stream.getTracks().forEach(t => t.stop());

            // Reset timer display
            timeLeft = 30;
            updateDisplay();
          };

          mediaRecorder.start();
          btn.textContent = 'Stop Recording';
          status.textContent = 'Recording...';

          // Start countdown
          timeLeft = 30;
          updateDisplay();
          timerInterval = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
              stopRecording();
            }
          }, 1000);

        } catch (err) {
          status.textContent = 'Microphone access denied: ' + err.message;
        }
      }
    }

    function stopRecording() {
      clearInterval(timerInterval);
      mediaRecorder.stop();
      document.getElementById('recordBtn').textContent = 'Start Recording';
      document.getElementById('status').textContent = 'Saving...';
    }
  </script>
</body>
</html>
